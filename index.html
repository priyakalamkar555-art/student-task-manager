</head>
<body>

        <a class="brand" href="#">Study Task Tracker</a>
        <div class="nav-links">

        </div>
    </nav>

    <main class="container">
        <p class="eyebrow">Stay organized</p>
        <h1>Plan your study tasks</h1>
        <p class="intro">Add tasks, track your list, and keep your study day moving.</p>

        <div class="task-form">
            <input type="text" id="taskInput" placeholder="Enter task">
            <button id="addTaskButton">Add</button>
        </div>

        <ul id="taskList"></ul>
    </main>

    <script>

                        addTask();
                    }
                });
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
