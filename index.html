<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

  <header class="site-header">
    <h1>📚 Study Task Tracker</h1>
    
    //Added mutiple themes 
  <select id="themeSwitcher" class="theme-dropdown">
  <option value="light">🌞 Light</option>
  <option value="dark">🌙 Dark</option>
  <option value="blue">🩵 Blue</option>
  <option value="pastel">🎀 Pastel</option>
</select>
    
  </header>
    <main class="container">
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What are you studying?">
            <div class="controls">
                <select id="categoryInput">
                    <option value="Theory">📘 Theory</option>
                    <option value="Practical">💻 Practical</option>
                    <option value="Revision">🔄 Revision</option>
                    <option value="Assignment">📝 Assignment</option>
                </select>
                <button id="addBtn" onclick="addTask()">Add Task</button>
            </div>
        </div>
        <ul id="taskList" aria-live="polite"></ul>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Study Task Tracker</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
