<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Task Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header">
    <h1>📚 Study Task Tracker</h1>
  </header>

  <main id="main-content" class="container">
    <form id="taskForm" onsubmit="event.preventDefault(); addTask();">
      <label for="taskInput">Task description</label>
      <input type="text" id="taskInput" placeholder="Enter task" aria-describedby="taskHelp">
      <button type="submit">Add</button>
      <p id="taskHelp" class="sr-only">Enter a task and press Add to track your study items.</p>
    </form>

    <p id="errorMsg" class="error" role="alert"></p>

    <ul id="taskList" aria-live="polite" aria-label="Task list"></ul>
  </main>

  <footer class="site-footer">
    <nav aria-label="Footer navigation">
  <a href="#taskInput">Add task</a>
  <a href="#taskList">View tasks</a>
  <a href="#main-content">Back to top</a>
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
      <a href="#main-content">Back to top</a>
    </nav>
    <p>Accessible study tracking with keyboard support and semantic structure.</p>
    <p>&copy; 2026 Study Task Tracker</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
