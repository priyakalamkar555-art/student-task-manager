<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <h1>📚 Study Task Tracker</h1>
        <select id="themeSwitcher" class="theme-dropdown">
            <option value="light">🌞 Light</option>
            <option value="dark">🌙 Dark</option>
            <option value="blue">🩵 Blue</option>
            <option value="pastel">🎀 Pastel</option>
        </select>
    </header>

    <main class="container" id="main-content">
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What are you studying?" aria-label="Task input">
            <div class="controls">
                <select id="categoryInput" aria-label="Task category">
                    <option value="Theory">📘 Theory</option>
                    <option value="Practical">💻 Practical</option>
                    <option value="Revision">🔄 Revision</option>
                    <option value="Assignment">📝 Assignment</option>
                </select>
                <button id="addBtn">Add Task</button>
            </div>
        </div>

        <div class="sort-controls">
            <button onclick="sortTasks('asc')">A to Z</button>
            <button onclick="sortTasks('desc')">Z to A</button>
        </div>

        <ul id="taskList" aria-live="polite" aria-label="Task list"></ul>

        <p id="errorMsg" class="error" role="alert"></p>
    </main>

    <footer class="site-footer">
        <nav aria-label="Footer navigation">
            <a href="#main-content">Back to top</a>
        </nav>
        <p>Accessible study tracking with keyboard support and semantic structure.</p>
        <p>&copy; 2026 Study Task Tracker</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
